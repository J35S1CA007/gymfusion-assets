<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staggered Puzzle Reveal</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    * { box-sizing: border-box; }
    .stage {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .frame {
      position: relative;
      width: min(100%, 100vh);
      aspect-ratio: 1 / 1;
      max-height: 100%;
      overflow: hidden;
      background: #000;
    }
    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      visibility: hidden;
      z-index: 1;
    }
    .puzzle-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    .puzzle-tile {
      position: absolute;
      width: calc(100% / 6);
      height: calc(100% / 4);
      background: #000;
      opacity: 0;
      transform: scale(0.96);
      will-change: transform, opacity;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.92));
    }
    .puzzle-tile img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .fade-layer {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <section class="stage" aria-label="Staggered puzzle reveal">
    <div class="frame" id="panel">
      <img class="slide" id="slide" src="https://cdn.jsdelivr.net/gh/J35S1CA007/gymfusion-assets@main/group-1-pics/group-smiling-splits-training-img-final_01_01.png" alt="Puzzle image" decoding="async" />
      <div class="puzzle-layer" id="puzzle-layer" aria-hidden="true"></div>
      <div class="fade-layer" id="fade-layer" aria-hidden="true"></div>
    </div>
  </section>

  <script>
    (() => {
      if (window.__gymfusionPuzzleRevealController) {
        window.__gymfusionPuzzleRevealController.stop();
      }

      const controller = {
        stopped: false,
        timers: [],
        animations: [],
        stop() {
          this.stopped = true;
          this.timers.forEach((timer) => clearTimeout(timer));
          this.animations.forEach((animation) => animation.cancel());
          this.timers = [];
          this.animations = [];
        }
      };
      window.__gymfusionPuzzleRevealController = controller;

      const tilesAcross = 6;
      const tilesDown = 4;
      const visibleCols = [1, 2, 3, 4];
      const tileStaggerMs = 260;
      const tileRevealMs = 900;
      const holdMs = 2200;
      const fadeMs = 900;
      const knot = 0.22;
      const bump = 0.18;

      const panel = document.getElementById("panel");
      const slide = document.getElementById("slide");
      const layer = document.getElementById("puzzle-layer");
      const fadeLayer = document.getElementById("fade-layer");
      if (!panel || !slide || !layer || !fadeLayer) return;
      const isCurrentRun = () => window.__gymfusionPuzzleRevealController === controller && !controller.stopped;
      const wait = (duration) => new Promise((resolve) => {
        const timer = setTimeout(resolve, duration);
        controller.timers.push(timer);
      });

      const images = [
        {
          prefix: "group-1-pics",
          tilePrefix: "group-smiling-splits-training-img-final",
          src: "https://cdn.jsdelivr.net/gh/J35S1CA007/gymfusion-assets@main/group-1-pics/group-smiling-splits-training-img-final_01_01.png",
          label: "Group 1",
          objectPosition: "center 44%",
          tileStaggerMs: 260,
          tileRevealMs: 900,
          holdMs: 2200
        },
        {
          prefix: "group-2-pics",
          tilePrefix: "group-2-people-strength-equipment",
          src: "https://cdn.jsdelivr.net/gh/J35S1CA007/gymfusion-assets@main/group-2-pics/group-2-people-strength-equipment_01_01.png",
          label: "Group 2",
          objectPosition: "center 54%",
          tileStaggerMs: 260,
          tileRevealMs: 900,
          holdMs: 2200
        }
      ];

      const makeTiles = () => {
        layer.innerHTML = "";
        const tiles = [];
        for (let row = 0; row < tilesDown; row += 1) {
          visibleCols.forEach((col, visibleCol) => {
            const tile = document.createElement("div");
            tile.className = "puzzle-tile";
            tile.style.left = `${(visibleCol / visibleCols.length) * 100}%`;
            tile.style.top = `${(row / tilesDown) * 100}%`;
            tile.style.width = `${100 / visibleCols.length}%`;
            tile.style.height = `${100 / tilesDown}%`;
            tile.dataset.row = String(row);
            tile.dataset.col = String(col);
            const img = document.createElement("img");
            img.alt = "";
            img.decoding = "async";
            tile.appendChild(img);
            layer.appendChild(tile);
            tiles.push(tile);
          });
        }
        return tiles;
      };

      const tileFilename = (tilePrefix, row, col) =>
        `${tilePrefix}_${String(row + 1).padStart(2, "0")}_${String(col + 1).padStart(2, "0")}.png`;

      const setTilesForSlide = (image, tiles) => {
        tiles.forEach((tile) => {
          const row = Number(tile.dataset.row);
          const col = Number(tile.dataset.col);
          const img = tile.querySelector("img");
          if (img) {
            img.src = `https://cdn.jsdelivr.net/gh/J35S1CA007/gymfusion-assets@main/${image.prefix}/${tileFilename(image.tilePrefix, row, col)}`;
          }
        });
      };

      const revealTiles = async (tiles, image) => {
        const order = tiles.map((_, i) => i).sort(() => Math.random() - 0.5);
        const animations = tiles.map((tile, i) => {
          const delay = order.indexOf(i) * image.tileStaggerMs;
          return tile.animate(
            [
              { opacity: 0, transform: "scale(0.9)" },
              { opacity: 1, transform: "scale(1)" }
            ],
            {
              duration: image.tileRevealMs,
              delay,
              easing: "cubic-bezier(0.22, 1, 0.36, 1)",
              fill: "forwards"
            }
          );
        });
        controller.animations.push(...animations);
        await Promise.all(animations.map((a) => a.finished.catch(() => undefined)));
        controller.animations = controller.animations.filter((animation) => !animations.includes(animation));
      };

      const build = () => makeTiles();

      const fadeOut = () => new Promise((resolve) => {
        if (!isCurrentRun()) {
          resolve();
          return;
        }
        const animation = fadeLayer.animate(
          [{ opacity: 0 }, { opacity: 1 }],
          { duration: fadeMs, easing: "ease-in-out", fill: "forwards" }
        );
        controller.animations.push(animation);
        animation.finished.then(resolve).catch(resolve);
      });

      const resetTiles = (tiles) => {
        tiles.forEach((tile) => {
          tile.getAnimations().forEach((animation) => animation.cancel());
          tile.style.opacity = "0";
          tile.style.transform = "scale(0.9)";
        });
      };

      const run = async () => {
        const tiles = panel.tiles;
        while (isCurrentRun()) {
          for (const image of images) {
            if (!isCurrentRun()) return;
            slide.src = image.src;
            resetTiles(tiles);
            setTilesForSlide(image, tiles);
            fadeLayer.getAnimations().forEach((animation) => animation.cancel());
            fadeLayer.style.opacity = "0";
            await revealTiles(tiles, image);
            if (!isCurrentRun()) return;
            await wait(image.holdMs);
            if (!isCurrentRun()) return;
            await fadeOut();
            controller.animations = controller.animations.filter((animation) => animation.playState !== "finished");
          }
        }
      };

      panel.tiles = build();
      run();
    })();
  </script>
</body>
</html>
