<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staggered Puzzle Reveal</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    * { box-sizing: border-box; }
    .stage {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: #000;
    }
    .panel {
      position: relative;
      overflow: hidden;
      background: #0a0f18;
    }
    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 1;
      z-index: 1;
    }
    .slide.photo-1 { object-position: center 44%; }
    .slide.photo-2 { object-position: center 54%; }
    .puzzle-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    .puzzle-tile {
      position: absolute;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0;
      transform: scale(0.96);
      will-change: transform, opacity;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.92));
    }
    .puzzle-tile.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .label {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 6;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font: 600 12px/1.2 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <section class="stage" aria-label="Staggered puzzle reveal">
    <div class="panel" id="panel-1">
      <img class="slide photo-1" src="https://cdn.jsdelivr.net/gh/J35S1CA007/gymfusion-assets@main/group-1-pics/group-smiling-splits-training-img-final_01_01.png" alt="Group 1 puzzle image" decoding="async" />
      <div class="puzzle-layer" id="puzzle-layer-1" aria-hidden="true"></div>
      <div class="label">Group 1</div>
    </div>
    <div class="panel" id="panel-2">
      <img class="slide photo-2" src="https://cdn.jsdelivr.net/gh/J35S1CA007/gymfusion-assets@main/group-2-pics/group-2-people-strength-equipment_01_01.png" alt="Group 2 puzzle image" decoding="async" />
      <div class="puzzle-layer" id="puzzle-layer-2" aria-hidden="true"></div>
      <div class="label">Group 2</div>
    </div>
  </section>

  <script>
    (() => {
      const tilesAcross = 4;
      const tilesDown = 4;
      const tileStaggerMs = 70;
      const tileRevealMs = 340;
      const cadenceMs = 2200;
      const knot = 0.22;
      const bump = 0.18;

      const panels = [
        {
          panel: document.getElementById("panel-1"),
          slide: document.querySelector("#panel-1 .slide"),
          layer: document.getElementById("puzzle-layer-1")
        },
        {
          panel: document.getElementById("panel-2"),
          slide: document.querySelector("#panel-2 .slide"),
          layer: document.getElementById("puzzle-layer-2")
        }
      ];

      if (panels.some((p) => !p.panel || !p.slide || !p.layer)) return;

      const makeTiles = (layer) => {
        layer.innerHTML = "";
        const tiles = [];
        for (let row = 0; row < tilesDown; row += 1) {
          for (let col = 0; col < tilesAcross; col += 1) {
            const tile = document.createElement("div");
            tile.className = "puzzle-tile";
            tile.style.left = `${(col / tilesAcross) * 100}%`;
            tile.style.top = `${(row / tilesDown) * 100}%`;
            tile.style.width = `${100 / tilesAcross}%`;
            tile.style.height = `${100 / tilesDown}%`;
            tile.dataset.row = String(row);
            tile.dataset.col = String(col);
            layer.appendChild(tile);
            tiles.push(tile);
          }
        }
        return tiles;
      };

      const getPiecePath = (row, col) => {
        const left = col === 0 ? 0 : -bump;
        const right = col === tilesAcross - 1 ? 0 : (col % 2 === 0 ? bump : -bump);
        const top = row === 0 ? 0 : -bump;
        const bottom = row === tilesDown - 1 ? 0 : (row % 2 === 0 ? bump : -bump);
        const x0 = `${(0 + left) * 100}%`;
        const x1 = `${(0.5 - knot) * 100}%`;
        const x2 = `${(0.5 + knot) * 100}%`;
        const x3 = `${(1 + right) * 100}%`;
        const y0 = `${(0 + top) * 100}%`;
        const y1 = `${(0.5 - knot) * 100}%`;
        const y2 = `${(0.5 + knot) * 100}%`;
        const y3 = `${(1 + bottom) * 100}%`;
        return `path("M ${x0} ${y1} C ${x0} ${y0}, ${x1} ${y0}, ${x1} ${y0} C ${x1} ${y0}, ${x1} ${y1}, ${x2} ${y1} C ${x3} ${y1}, ${x3} ${y0}, ${x3} ${y0} C ${x3} ${y0}, ${x3} ${y2}, ${x2} ${y2} C ${x1} ${y2}, ${x1} ${y3}, ${x1} ${y3} C ${x1} ${y3}, ${x0} ${y3}, ${x0} ${y2} Z")`;
      };

      const setTilesForSlide = (slide, tiles) => {
        const src = slide.getAttribute("src") || "";
        const position = slide.style.objectPosition || getComputedStyle(slide).objectPosition || "center center";
        tiles.forEach((tile) => {
          tile.style.backgroundImage = `url("${src}")`;
          tile.style.backgroundPosition = position;
          tile.style.clipPath = getPiecePath(Number(tile.dataset.row), Number(tile.dataset.col));
        });
      };

      const revealTiles = async (tiles) => {
        const animations = tiles.map((tile, i) => {
          const row = Math.floor(i / tilesAcross);
          const col = i % tilesAcross;
          const delay = (row * tilesAcross + col) * tileStaggerMs;
          return tile.animate(
            [
              { opacity: 0, transform: "scale(0.92)" },
              { opacity: 1, transform: "scale(1)" }
            ],
            {
              duration: tileRevealMs,
              delay,
              easing: "cubic-bezier(0.22, 1, 0.36, 1)",
              fill: "forwards"
            }
          );
        });
        await Promise.all(animations.map((a) => a.finished.catch(() => undefined)));
      };

      const build = () => {
        panels.forEach((panel) => {
          panel.tiles = makeTiles(panel.layer);
          setTilesForSlide(panel.slide, panel.tiles);
        });
      };

      const run = async () => {
        for (const panel of panels) {
          panel.tiles.forEach((tile) => {
            tile.style.opacity = "0";
            tile.style.transform = "scale(0.96)";
          });
        }
        for (const panel of panels) {
          await revealTiles(panel.tiles);
          await new Promise((r) => setTimeout(r, cadenceMs / 2));
        }
      };

      build();
      run();
      setInterval(run, cadenceMs * 2);
    })();
  </script>
</body>
</html>
